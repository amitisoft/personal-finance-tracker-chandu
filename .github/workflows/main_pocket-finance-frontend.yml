# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Frontend app to Azure Web App - pocket-finance-frontend

on:
  push:
    branches:
      - main
    paths:
      - "pft-frontend/**"
      - ".github/workflows/main_pocket-finance-frontend.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout
    defaults:
      run:
        working-directory: pft-frontend
    env:
      # Prefer GitHub repo Variables for non-secret config.
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: pft-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: pft-frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          # If you used Azure App Service Deployment Center (GitHub Actions), replace these secret names
          # with the ones it created for your frontend app.
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_POCKET_FINANCE_FRONTEND }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_POCKET_FINANCE_FRONTEND }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_POCKET_FINANCE_FRONTEND }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "pocket-finance-frontend"
          slot-name: "Production"
          package: .

